<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --warm-bg:#F0FBF4;--card-bg:#fff;
  --primary:#10B981;--primary-dark:var(--primary);--primary-light:var(--border-light);
  --secondary:#FACC15;--secondary-light:#FEF9C3;
  --tertiary:#FB923C;--tertiary-light:#FFF7ED;
  --neutral:#334155;--neutral-mid:#64748B;--neutral-soft:#94A3B8;
  --text-dark:#1E293B;--text-mid:#334155;--text-soft:#64748B;
  --border:var(--border);--border-light:var(--border-light);
  --green:#10B981;--green-dark:var(--primary);--green-light:var(--border-light);
  --orange:#FB923C;--orange-light:#FFF7ED;
  --amber:#D97706;--amber-light:#FFFBEB;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--warm-bg);color:var(--text-dark);min-height:100vh;overflow-x:hidden}
nav{background:rgba(20,50,20,0.55);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.1);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:900;color:var(--orange);text-decoration:none}
.logo-icon{width:36px;height:36px;background:var(--orange);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.lang-toggle{font-size:12px;font-weight:800;color:var(--text-mid);background:var(--warm-bg);border:1.5px solid var(--border);border-radius:20px;padding:5px 14px;cursor:pointer;transition:all .15s;font-family:'Nunito',sans-serif}
.lang-toggle:hover{border-color:var(--orange);color:var(--orange)}
.hero-section{background:var(--warm-bg);padding:0 20px;position:relative;min-height:380px;overflow:hidden}
.hero-section::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,#E8C9A0 1px,transparent 1px);background-size:28px 28px;opacity:.35;pointer-events:none}
.doodle{position:absolute;pointer-events:none;user-select:none}
.hills{position:absolute;bottom:0;left:0;right:0;pointer-events:none}
.hero-content{position:relative;z-index:2;text-align:center;padding:40px 0 170px;max-width:560px;margin:0 auto}
.hero-pill{display:inline-block;background:#fff;border:1.5px solid #E8C9A0;color:#B07A3A;font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:5px 16px;border-radius:30px;margin-bottom:18px}
.hero-h1{font-size:36px;font-weight:800;line-height:1.25;color:#fff;margin-bottom:14px;font-family:'Bricolage Grotesque',sans-serif;text-shadow:0 2px 16px rgba(0,0,0,0.3)}
.hero-h1 em{color:#86EFAC;font-style:normal}
.hero-sub{font-size:15px;color:rgba(255,255,255,0.88);line-height:1.75;margin-bottom:30px}
.search-wrap{position:relative;max-width:480px;margin:0 auto 20px}
.search-bar{display:flex;align-items:center;gap:8px;background:#fff;border-radius:50px;border:2px solid #E8C9A0;padding:6px 6px 6px 20px;box-shadow:0 4px 16px rgba(180,100,30,.1)}
.search-bar input{flex:1;border:none;outline:none;font-family:'Nunito',sans-serif;font-size:14px;color:var(--text-dark);background:transparent}
.search-bar input::placeholder{color:var(--text-soft)}
.search-btn{background:var(--orange);color:#fff;border:none;border-radius:40px;padding:9px 22px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;transition:background .15s,transform .1s}
.search-btn:hover{background:var(--primary-dark);transform:scale(1.03)}
.search-status{font-size:12px;color:rgba(255,255,255,0.8);margin-top:8px;min-height:18px;text-align:center}
.search-status.loading{color:var(--orange)}
.search-status.error{color:#DC2626}
.suggest-box{position:absolute;left:0;right:0;top:100%;background:#fff;border:1.5px solid #E8C9A0;border-top:none;border-radius:0 0 18px 18px;z-index:50;box-shadow:0 8px 24px rgba(180,100,30,.12);max-height:260px;overflow-y:auto;display:none}
.suggest-item{padding:11px 20px;font-size:13px;color:var(--text-dark);cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:.5px solid var(--border-light);transition:background .1s}
.suggest-item:last-child{border-bottom:none}
.suggest-item:hover{background:var(--orange-light)}
.suggest-name{flex:1;font-weight:700}
.suggest-dist{font-size:11px;color:var(--text-soft);white-space:nowrap;background:var(--warm-bg);padding:2px 8px;border-radius:10px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:560px;margin:0 auto}
.chip{display:flex;align-items:center;gap:5px;padding:7px 15px;border-radius:30px;border:1.5px solid var(--border);background:#fff;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;color:var(--text-mid);cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--orange);color:var(--orange)}
.chip.on{background:var(--orange);border-color:var(--orange);color:#fff}
.chip-dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.7;flex-shrink:0}
.cards-area{background:var(--warm-bg);padding:0 20px 60px;position:relative;z-index:3}
.cards-bar{display:flex;align-items:center;justify-content:space-between;max-width:900px;margin:0 auto 18px;padding-top:8px}
.cards-bar-title{font-size:16px;font-weight:800;color:var(--text-dark)}
.cards-bar-count{font-size:13px;font-weight:600;color:var(--text-soft)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;max-width:900px;margin:0 auto}
.card{background:var(--card-bg);border-radius:20px;border:1.5px solid var(--border);padding:20px;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;text-decoration:none;display:block;color:inherit}
.card::after{content:'';position:absolute;bottom:0;right:0;width:90px;height:90px;border-radius:50%;opacity:.06;pointer-events:none;transform:translate(28px,28px)}
.card.cfree::after{background:var(--primary)}
.card.clow::after{background:#C8861A}
.card.cappt::after{background:#6B7FC4}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(180,100,30,.14)}
.card-stripe{position:absolute;top:0;left:0;right:0;height:4px;border-radius:20px 20px 0 0}
.cfree .card-stripe{background:var(--primary)}
.clow .card-stripe{background:#D97706}
.cappt .card-stripe{background:#475569}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px;margin-top:6px}
.card-icon-wrap{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.cfree .card-icon-wrap{background:var(--primary-light)}
.clow .card-icon-wrap{background:#FDF3E3}
.cappt .card-icon-wrap{background:#F1F5F9}
.badge{font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:4px 10px;border-radius:20px;flex-shrink:0}
.cfree .badge{background:var(--border-light);color:var(--primary-dark)}
.clow .badge{background:#FDF3E3;color:#8A5C10}
.cappt .badge{background:#F1F5F9;color:#334155}
.card-name{font-size:15px;font-weight:700;color:var(--text-dark);line-height:1.3;margin-bottom:7px;font-family:'Bricolage Grotesque',sans-serif}
.card-desc{font-size:13px;color:var(--text-mid);line-height:1.65;margin-bottom:14px}
.card-info{border-top:1px solid #E7F5EE;padding-top:12px;display:flex;flex-direction:column;gap:6px}
.info-row{display:flex;align-items:flex-start;gap:7px;font-size:12px;color:var(--text-mid)}
.info-row strong{color:var(--text-dark);font-weight:700}
.info-ic{font-size:14px;flex-shrink:0;margin-top:1px}
.dist-pill{display:inline-flex;align-items:center;gap:4px;background:var(--border-light);color:var(--primary-dark);font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;margin-top:10px}
.card-link-hint{margin-top:10px;font-size:12px;color:var(--primary);font-weight:800;display:flex;align-items:center;gap:5px}
.appt-note{margin-top:10px;padding:8px 12px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;font-size:12px;color:#92400E;font-weight:600}
.empty{text-align:center;padding:80px 24px;color:var(--text-soft);display:none}
.empty p{font-size:15px;margin-top:10px}
.section-divider{max-width:900px;margin:0 auto 14px;padding-top:20px;font-size:13px;font-weight:800;color:var(--text-soft);display:flex;align-items:center;gap:10px}
.section-divider::after{content:'';flex:1;height:1px;background:var(--border-light)}
.footer-band{background:#fff;border-top:1.5px solid var(--border);padding:44px 24px 52px;text-align:center;position:relative;overflow:hidden}
.footer-band::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,#F0D8B0 1px,transparent 1px);background-size:22px 22px;opacity:.25;pointer-events:none}
.footer-illus{display:flex;justify-content:center;align-items:flex-end;gap:16px;margin-bottom:28px;position:relative}
.footer-quote{position:relative;max-width:540px;margin:0 auto 8px}
.footer-quote blockquote{font-size:19px;line-height:1.85;color:#F0FDF4;font-weight:700;margin-bottom:12px;font-family:'Bricolage Grotesque',sans-serif}
.footer-quote blockquote em{color:#FACC15;font-style:normal}
.footer-quote p{font-size:13px;color:#94A3B8;line-height:1.85}
.footer-btn{background:var(--primary);color:#fff;border:none;border-radius:14px;padding:12px 30px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:background .15s;position:relative;margin-top:22px}
.footer-btn:hover{background:#357A56}
@media(max-width:600px){.hero-h1{font-size:24px}.grid{grid-template-columns:1fr}.footer-quote blockquote{font-size:15px}.doodle{display:none}}
</style>
</head>

// Haversine distance in km
function haversine(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function fmtDist(km){
  if(km<1)return Math.round(km*1000)+'m';
  return km.toFixed(1)+'km';
}

// Geocode: try postcode map, suburb map, then Nominatim API
async function geocode(query){
  const q=query.trim().toLowerCase();
  // Exact postcode
  if(/^\d{4}$/.test(q.trim())&&POSTCODES[q.trim()])return POSTCODES[q.trim()];
  // Suburb name
  for(const[k,pc]of Object.entries(SUBURBS)){
    if(q.includes(k)&&POSTCODES[pc])return POSTCODES[pc];
  }
  // Postcode in query string
  const pcMatch=q.match(/\b(5\d{3})\b/);
  if(pcMatch&&POSTCODES[pcMatch[1]])return POSTCODES[pcMatch[1]];
  // Nominatim fallback
  try{
    const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query+', South Australia, Australia')}&format=json&limit=1`;
    const res=await fetch(url,{headers:{'Accept-Language':L==='zh'?'zh-CN,zh':'en-AU,en'}});
    const data=await res.json();
    if(data&&data[0])return[parseFloat(data[0].lat),parseFloat(data[0].lon)];
  }catch(e){}
  return null;
}

let searchTimer=null;
async function doSearch(){
  const q=document.getElementById('srch').value.trim();
  if(!q){searchMode=false;searchLat=null;searchLng=null;render();return;}
  const status=document.getElementById('search-status');
  status.textContent=t('locating');
  status.className='search-status loading';
  document.getElementById('suggest').style.display='none';
  const coords=await geocode(q);
  if(!coords){
    status.textContent=t('locError');
    status.className='search-status error';
    return;
  }
  searchLat=coords[0];searchLng=coords[1];
  searchMode=true;
  status.textContent='';
  status.className='search-status';
  document.getElementById('bar-title').textContent=t('barTitleDist');
  applyLang();
  render();
}

function onInput(){
  clearTimeout(searchTimer);
  const q=document.getElementById('srch').value.trim();
  const box=document.getElementById('suggest');
  if(!q){box.style.display='none';render();return;}
  // Quick suggest from suburb/site names
  const ql=q.toLowerCase();
  const matches=SITES.filter(s=>{
    const n=td(s,'name').toLowerCase();
    return n.includes(ql)||s.addr.toLowerCase().includes(ql);
  }).slice(0,5);
  // Also suggest matching suburbs
  const subMatches=Object.keys(SUBURBS).filter(k=>k.includes(ql)).slice(0,3);
  const rows=[];
  subMatches.forEach(sub=>{
    rows.push(`<div class="suggest-item" onmousedown="pickSuburb(event,'${sub}')">
      <span>📍</span><span class="suggest-name">${sub.charAt(0).toUpperCase()+sub.slice(1)}</span>
      <span class="suggest-dist">${SUBURBS[sub]}</span></div>`);
  });
  matches.forEach(s=>{
    rows.push(`<div class="suggest-item" onmousedown="pickSite(event,${s.sid})">
      <span>${s.ic}</span><span class="suggest-name">${td(s,'name')}</span>
      <span class="suggest-dist">${s.addr.split(',')[0]}</span></div>`);
  });
  // Always re-render cards to match current text
  render();
  if(!rows.length){box.style.display='none';return;}
  box.innerHTML=rows.join('');
  box.style.display='block';
}

function pickSuburb(e,sub){
  e.preventDefault();
  document.getElementById('srch').value=sub.charAt(0).toUpperCase()+sub.slice(1);
  document.getElementById('suggest').style.display='none';
  doSearch();
}
function pickSite(e,sid){
  e.preventDefault();
  const s=SITES[sid];
  document.getElementById('srch').value=s.addr.split(',')[0];
  document.getElementById('suggest').style.display='none';
  doSearch();
}

}

function cardHTML(s,distKm){
  const distPill=s.isCity?`<div class="dist-pill" style="background:#EEF0FA;color:#4A5CA0">🌏 ${L==='zh'?'覆盖全 Adelaide':'Covers all Adelaide'}</div>`:distKm!=null?`<div class="dist-pill">📍 ${fmtDist(distKm)} ${t('distAway')}</div>`:'';
  return `<a class="card ${cl(s)}" href="${s.url}" target="_blank" rel="noopener noreferrer">
    <div class="card-stripe"></div>
    <div class="card-head"><div class="card-icon-wrap">${s.ic}</div><span class="badge">${bl(s)}</span></div>
    <div class="card-name">${td(s,'name')}</div>
    <div class="card-desc">${td(s,'desc')}</div>
    <div class="card-info">
      <div class="info-row"><span class="info-ic">📍</span><span><strong>${s.addr}</strong></span></div>
      <div class="info-row"><span class="info-ic">🕐</span><span>${hrs(s)}</span></div>
      ${s.ph?`<div class="info-row"><span class="info-ic">📞</span><span><strong>${s.ph}</strong></span></div>`:''}
    </div>
    ${distPill}
    ${s.appt?`<div class="appt-note">${t('apptNote')}</div>`:''}
    <div class="card-link-hint"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><path d="M2 10 L10 2M6 2h4v4"/></svg>${t('visitSite')}</div>
  </a>`;
}

function render(){
  const grid=document.getElementById('grid');
  const wrap=document.getElementById('grid-wrap');
  const empty=document.getElementById('empty');

  if(searchMode&&searchLat!=null){
    // Distance mode: citywide services always shown separately; fixed sites sorted by distance
    const fixed=SITES.filter(s=>!s.isCity).map(s=>({...s,distKm:haversine(searchLat,searchLng,s.lat,s.lng)}));
    const city=SITES.filter(s=>s.isCity);
    fixed.sort((a,b)=>a.distKm-b.distKm);
    // Nearby = within 15km
    const nearby=fixed.filter(s=>s.distKm<=15);
    const others=[...fixed.filter(s=>s.distKm>15),...city];
    document.getElementById('cnt').textContent=t('count')(fixed.length+city.length);
    empty.style.display='none';
    wrap.innerHTML='';
    if(nearby.length){
      const d1=document.createElement('div');d1.className='section-divider';d1.textContent=t('nearbyTitle');
      const g1=document.createElement('div');g1.className='grid';
      g1.innerHTML=nearby.map(s=>cardHTML(s,s.distKm)).join('');
      wrap.appendChild(d1);wrap.appendChild(g1);
    }
    if(others.length){
      const d2=document.createElement('div');d2.className='section-divider';d2.textContent=t('otherTitle');
      const g2=document.createElement('div');g2.className='grid';
      g2.innerHTML=others.map(s=>cardHTML(s,s.distKm)).join('');
      wrap.appendChild(d2);wrap.appendChild(g2);
    }
    return;
  }

  // Normal filter mode — also applies text search if query present
  const srchQ=document.getElementById('srch').value.toLowerCase().trim();
  const list=SITES.filter(s=>{
    const areaOk = (s.areas||[]).includes(af);
    const filterOk=af==='all'?true:af==='free'?s.t==='free':af==='low'?s.t==='low':af==='noAppt'?!s.appt:areaOk;
    if(!filterOk)return false;
    if(!srchQ)return true;
    const n=td(s,'name').toLowerCase();
    const d=td(s,'desc').toLowerCase();
    return n.includes(srchQ)||d.includes(srchQ)||s.addr.toLowerCase().includes(srchQ);
  });
  document.getElementById('cnt').textContent=t('count')(list.length);
  if(!list.length){wrap.innerHTML='<div class="grid" id="grid"></div>';empty.style.display='block';return;}
  empty.style.display='none';
  const g=document.createElement('div');g.className='grid';
  g.innerHTML=list.map(s=>cardHTML(s,null)).join('');
  wrap.innerHTML='';
  // prepend Find Food card in normal mode too
  wrap.appendChild(g);
}

// Keyboard: press Enter in search box
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('srch').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
  L=detectLang();applyLang();render();
});
</script>
</body>
